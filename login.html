<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Hannover</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1A0A0E;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif}
.box{background:#2A1218;border:1px solid #4A2A30;border-radius:6px;padding:40px 32px;width:100%;max-width:380px;margin:16px}
h1{color:#C9A96E;font-size:20px;text-align:center;margin-bottom:4px;letter-spacing:2px}
p{color:#666;font-size:11px;text-align:center;margin-bottom:28px;letter-spacing:1px}
label{display:block;color:#888;font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
input{width:100%;background:#1A0A0E;border:1px solid #3A2020;border-radius:3px;padding:12px;color:#F7F3EE;font-size:15px;outline:none;margin-bottom:16px}
input:focus{border-color:#C9A96E}
.pass{position:relative}
.pass input{padding-right:44px}
.eye{position:absolute;right:12px;top:12px;background:none;border:none;color:#555;cursor:pointer;font-size:16px}
button.btn{width:100%;background:#8B1A2B;border:none;border-radius:3px;padding:13px;color:#F7F3EE;font-size:13px;font-weight:bold;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
button.btn:active{background:#6A1020}
.err{display:none;color:#E87070;font-size:12px;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="box">
  <h1>HANNOVER</h1>
  <p>SISTEMA OPERACIONAL</p>
  <label>Usuário</label>
  <input type="text" id="u" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
  <label>Senha</label>
  <div class="pass">
    <input type="password" id="p" autocomplete="current-password">
    <button class="eye" type="button" onclick="toggleSenha()">👁</button>
  </div>
  <button class="btn" onclick="login()">Entrar</button>
  <div class="err" id="err">Usuário ou senha incorretos.</div>
</div>
<script>
var U={
  'guilherme.lich':{s:'han@admin2024',a:['pedidos','dashboard']},
  'alexandre':{s:'han@comp2024',a:['dashboard','pedidos']},
  'rafael':{s:'han@comp2024',a:['dashboard','pedidos']},
  'miguel':{s:'han@cd2024',u:'Centro de Distribuicao',a:['dashboard','pedidos']},
  'mirna':{s:'han@moema2024',u:'Moema',a:['pedidos']},
  'eduarda':{s:'han@moema2024',u:'Moema',a:['pedidos']},
  'krislley':{s:'han@tomahawk24',u:'Tomahawk',a:['pedidos']},
  'yuri':{s:'han@hambur2024',u:'Hamburgo & Fries',a:['pedidos']},
  'matheus':{s:'han@cozinha24',u:'Cozinha Central',a:['pedidos']},
  'keke':{s:'han@perdiz2024',u:'Perdizes',a:['pedidos']},
  'tati':{s:'han@perdiz2024',u:'Perdizes',a:['pedidos']},
  'evelise':{s:'han@tatua2024',u:'Tatuapé',a:['pedidos']},
  'guilherme.sub':{s:'han@tatua2024',u:'Tatuapé',a:['pedidos']},
  'lucas':{s:'han@receb2024',u:'Cozinha Central',a:['pedidos']},
  'marcelo':{s:'han@receb2024',u:'Cozinha Central',a:['pedidos']},
  'alexandra':{s:'han@central2024',u:'Todas',a:['pedidos','dashboard']}
};

function toggleSenha(){
  var i=document.getElementById('p');
  i.type=i.type==='password'?'text':'password';
}

function login(){
  var u=document.getElementById('u').value.trim().toLowerCase();
  var p=document.getElementById('p').value;
  var user=U[u];
  if(!user||user.s!==p){
    document.getElementById('err').style.display='block';
    return;
  }
  document.getElementById('err').style.display='none';
  var data=JSON.stringify({login:u,perfil:u==='guilherme.lich'?'admin':u==='alexandre'||u==='rafael'?'comprador':u==='miguel'?'cd':u==='matheus'?'cozinha':u==='alexandra'?'cd_cozinha':u==='lucas'?'recebedor_fria':u==='marcelo'?'recebedor_seca':'operador',unidade:user.u||null,acesso:user.a});
  sessionStorage.setItem('han_user',data);
  localStorage.setItem('han_user',data);
  if(user.a.indexOf('dashboard')>=0&&(u==='guilherme.lich'||u==='alexandre'||u==='rafael'||u==='alexandra')){
    window.location.href='dashboard.html';
  } else {
    window.location.href='pedidos.html';
  }
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')login();});
</script>
</body>
</html>
