<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Hannover — Acesso</title>
<meta name="description" content="Sistema operacional interno — Grupo Hannover">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%238B1A2B'/><text y='24' x='6' font-size='22' fill='%23C9A96E'>H</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cherry:#8B1A2B;--maroon:#5C0E1A;--cream:#F7F3EE;--gold:#C9A96E;--dark:#1A0A0E}
body{min-height:100vh;background:var(--dark);display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(139,26,43,0.18) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 80% 30%,rgba(201,169,110,0.08) 0%,transparent 60%);pointer-events:none}
.card{position:relative;z-index:1;background:rgba(26,10,14,0.85);border:1px solid rgba(201,169,110,0.2);border-radius:2px;padding:56px 48px 48px;width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(201,169,110,0.1);animation:fadeUp 0.6s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo-area{text-align:center;margin-bottom:40px}
.logo-mark{width:56px;height:56px;margin:0 auto 16px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:28px;height:28px;fill:var(--gold)}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--cream);letter-spacing:0.15em;text-transform:uppercase}
.brand-sub{font-size:10px;font-weight:300;color:rgba(247,243,238,0.4);letter-spacing:0.3em;text-transform:uppercase;margin-top:4px}
.divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px auto 0}
.field{margin-bottom:20px}
label{display:block;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,243,238,0.5);margin-bottom:8px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(201,169,110,0.2);border-radius:2px;padding:14px 16px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
input:focus{border-color:rgba(201,169,110,0.5);background:rgba(255,255,255,0.06)}
input::placeholder{color:rgba(247,243,238,0.2)}
.btn{width:100%;background:var(--cherry);border:none;border-radius:2px;padding:16px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background 0.2s}
.btn:hover{background:var(--maroon)}
.error-msg{display:none;background:rgba(139,26,43,0.2);border:1px solid rgba(139,26,43,0.4);border-radius:2px;padding:10px 14px;color:#E87070;font-size:12px;margin-top:14px;text-align:center}
.footer-note{text-align:center;margin-top:32px;font-size:10px;color:rgba(247,243,238,0.2);letter-spacing:0.1em}
@media(max-width:480px){.card{padding:40px 28px 36px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7L12 19.82 4 15.5v-7L12 4.18z"/></svg>
    </div>
    <div class="brand-name">Grupo Hannover</div>
    <div class="brand-sub">Sistema Operacional</div>
    <div class="divider"></div>
  </div>
  <div class="field">
    <label>Usuário</label>
    <input type="text" id="username" placeholder="seu.usuario" autocomplete="username" autocapitalize="none">
  </div>
  <div class="field">
    <label>Senha</label>
    <div style="position:relative"><input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px"><button type="button" onclick="toggleSenha()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(247,243,238,0.4);font-size:16px;padding:0;line-height:1" id="btnToggleSenha">👁</button></div>
  </div>
  <button class="btn" onclick="doLogin()">Entrar</button>
  <div class="error-msg" id="errMsg">Usuário ou senha incorretos.</div>
  <div class="footer-note">Acesso restrito — Grupo Hannover © 2025</div>
</div>
<script>
var USERS = {
  'guilherme.lich': { senha:'han@admin2024',  perfil:'admin',         unidade:'Todas',                   acesso:['pedidos','dashboard'] },
  'alexandre':      { senha:'han@comp2024',   perfil:'comprador',     unidade:null,                      acesso:['dashboard'] },
  'rafael':         { senha:'han@comp2024',   perfil:'comprador',     unidade:null,                      acesso:['dashboard'] },
  'miguel':         { senha:'han@cd2024',     perfil:'cd',            unidade:'Centro de Distribuicao',  acesso:['dashboard','pedidos'] },
  'mirna':          { senha:'han@moema2024',  perfil:'operador',      unidade:'Moema',                   acesso:['pedidos'] },
  'eduarda':        { senha:'han@moema2024',  perfil:'operador',      unidade:'Moema',                   acesso:['pedidos'] },
  'krislley':       { senha:'han@tomahawk24', perfil:'operador',      unidade:'Tomahawk',                acesso:['pedidos'] },
  'yuri':           { senha:'han@hambur2024', perfil:'operador',      unidade:'Hamburgo & Fries',        acesso:['pedidos'] },
  'matheus':        { senha:'han@cozinha24',  perfil:'cozinha',       unidade:'Cozinha Central',         acesso:['dashboard','pedidos'] },
  'keke':           { senha:'han@perdiz2024', perfil:'operador',      unidade:'Perdizes',                acesso:['pedidos'] },
  'tati':           { senha:'han@perdiz2024', perfil:'operador',      unidade:'Perdizes',                acesso:['pedidos'] },
  'evelise':        { senha:'han@tatua2024',  perfil:'operador',      unidade:'Tatuape',                 acesso:['pedidos'] },
  'guilherme.sub':  { senha:'han@tatua2024',  perfil:'operador',      unidade:'Tatuape',                 acesso:['pedidos'] },
  'lucas':          { senha:'han@receb2024',  perfil:'recebedor_fria',unidade:'Cozinha Central',         acesso:['dashboard'] },
  'marcelo':        { senha:'han@receb2024',  perfil:'recebedor_seca',unidade:'Cozinha Central',         acesso:['dashboard'] },
  'alexandra':      { senha:'han@central2024',perfil:'cd_cozinha',   unidade:'Todas',                   acesso:['pedidos','dashboard'] }
};

function toggleSenha(){
  var inp=document.getElementById('password');
  var btn=document.getElementById('btnToggleSenha');
  if(inp.type==='password'){inp.type='text';btn.style.color='rgba(247,243,238,0.7)';}
  else{inp.type='password';btn.style.color='rgba(247,243,238,0.4)';}
}
function doLogin() {
  var u = document.getElementById('username').value.trim().toLowerCase();
  var p = document.getElementById('password').value;
  var err = document.getElementById('errMsg');
  var user = USERS[u];
  if (!user || user.senha !== p) { err.style.display='block'; return; }
  err.style.display = 'none';
  var userData = JSON.stringify({ login:u, perfil:user.perfil, unidade:user.unidade, acesso:user.acesso });
  sessionStorage.setItem('han_user', userData);
  localStorage.setItem('han_user', userData); // Persiste sessão entre abas
  window.location.href = user.perfil==='operador' ? 'pedidos.html' : 'dashboard.html';
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

// Auto-redirect se já logado
(function(){
  var s = sessionStorage.getItem('han_user');
  if (s) {
    var u = JSON.parse(s);
    window.location.href = u.perfil==='operador' ? 'pedidos.html' : 'dashboard.html';
  }
})();
</script>
</body>
</html>
