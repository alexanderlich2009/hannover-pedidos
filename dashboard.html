<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Grupo Hannover</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cherry:#8B1A2B;--maroon:#5C0E1A;--cream:#F7F3EE;--gold:#C9A96E;
  --dark:#1A0A0E;--bg:#FAF8F5;--white:#fff;--border:#E8E0D6;--text:#2C1010;
  --muted:rgba(44,16,16,0.45);--fria:#1A4A7A;--seca:#B8600A;--green:#2D7A4F;--sidebar:220px;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
/* NAV */
.topnav{background:var(--dark);border-bottom:1px solid rgba(201,169,110,0.15);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-brand{font-family:'Cormorant Garamond',serif;color:var(--cream);font-size:19px;letter-spacing:0.12em;display:flex;align-items:center;gap:10px}
.nav-dot{width:6px;height:6px;background:var(--gold);border-radius:50%}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-user{text-align:right}
.nav-user-name{font-size:12px;font-weight:600;color:var(--cream)}
.nav-user-role{font-size:10px;color:rgba(201,169,110,0.6);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px}
.nav-btn{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(201,169,110,0.7);background:none;border:1px solid rgba(201,169,110,0.25);border-radius:2px;cursor:pointer;padding:6px 12px;font-family:'Montserrat',sans-serif;transition:all 0.2s}
.nav-logout{font-size:10px;color:rgba(247,243,238,0.35);background:none;border:none;cursor:pointer;padding:6px;font-family:'Montserrat',sans-serif;letter-spacing:0.1em;text-transform:uppercase}
.nav-logout:hover{color:rgba(247,243,238,0.7)}
/* LAYOUT */
.app-body{display:flex;flex:1;min-height:0}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:rgba(44,16,16,0.3);padding:0 16px 6px;margin-top:12px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;font-size:12px;font-weight:500;color:rgba(44,16,16,0.55);transition:all 0.15s}
.sb-item:hover{background:rgba(139,26,43,0.04);color:var(--cherry)}
.sb-item.active{background:rgba(139,26,43,0.06);color:var(--cherry);border-left-color:var(--cherry);font-weight:600}
.sb-icon{font-size:14px;flex-shrink:0;width:16px;text-align:center}
.sb-badge{margin-left:auto;background:var(--cherry);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;display:none}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px}
.pg-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pg-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--dark)}
.pg-sub{font-size:12px;color:var(--muted);margin-top:4px}
/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.c-cherry::before{background:var(--cherry)}
.kpi.c-gold::before{background:var(--gold)}
.kpi.c-fria::before{background:var(--fria)}
.kpi.c-seca::before{background:var(--seca)}
.kpi.c-green::before{background:var(--green)}
.kpi-lbl{font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--dark);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:6px}
/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:3px;margin-bottom:20px;overflow:hidden}
.card-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-title{font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text)}
.card-body{padding:20px}
/* BUTTONS */
.btn{font-size:10px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;padding:7px 16px;border-radius:2px;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif;border:none;white-space:nowrap}
.btn-primary{background:var(--cherry);color:var(--cream)}
.btn-primary:hover{background:var(--maroon)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#1f5a38}
.btn-amber{background:var(--seca);color:#fff}
.btn-amber:hover{background:#8B480A}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}
.btn-outline{background:transparent;color:var(--cherry);border:1px solid rgba(139,26,43,0.3)}
.btn-outline:hover{background:rgba(139,26,43,0.05)}
.btn-sm{padding:5px 12px;font-size:10px}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:2px solid var(--border)}
th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
td{padding:10px 14px;border-bottom:1px solid rgba(232,224,214,0.6);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(139,26,43,0.015)}
.td-name{font-weight:600;color:var(--text)}
.td-sub{color:var(--muted);font-size:11px;margin-top:1px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-pending{background:rgba(184,96,10,0.1);color:var(--seca)}
.b-progress{background:rgba(26,74,122,0.1);color:var(--fria)}
.b-done{background:rgba(45,122,79,0.1);color:var(--green)}
.b-wait{background:rgba(139,26,43,0.1);color:var(--cherry)}
.b-ok{background:rgba(45,122,79,0.1);color:var(--green)}
.b-reject{background:rgba(139,26,43,0.1);color:var(--cherry)}
.b-fria{background:rgba(26,74,122,0.1);color:var(--fria)}
.b-seca{background:rgba(184,96,10,0.1);color:var(--seca)}
/* DETAIL PANEL */
.detail-panel{display:none;background:var(--bg);border-top:1px solid var(--border);padding:16px 20px}
.detail-panel.open{display:block}
/* ALERTS */
.alert{border-radius:3px;padding:10px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500}
.alert-red{background:rgba(139,26,43,0.07);border:1px solid rgba(139,26,43,0.2);color:var(--cherry)}
.alert-yellow{background:rgba(184,96,10,0.07);border:1px solid rgba(184,96,10,0.2);color:var(--seca)}
/* FORM */
.form-field{margin-bottom:14px}
.form-label{display:block;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;border:1px solid var(--border);border-radius:2px;padding:9px 12px;font-family:'Montserrat',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cherry)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(26,10,14,0.82);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--white);border-radius:4px;padding:32px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.4);animation:fadeUp 0.2s ease}
.modal-box.wide{max-width:820px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--dark);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.modal-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(26,10,14,0.5);z-index:600;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:2px solid rgba(247,243,238,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;z-index:700;background:var(--dark);color:var(--cream);border:1px solid rgba(201,169,110,0.2);border-radius:3px;padding:14px 20px;max-width:320px;transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast-title{font-weight:600;font-size:13px;margin-bottom:2px}
.toast-msg{font-size:12px;color:rgba(247,243,238,0.6)}
/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.5}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text);margin-bottom:6px}
/* DRE */
.dre-table{width:100%;border-collapse:collapse;font-size:12px}
.dre-table th{padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:2px solid var(--border);text-align:right}
.dre-table th:first-child{text-align:left}
.dre-table td{padding:8px 12px;border-bottom:1px solid rgba(232,224,214,0.4);text-align:right}
.dre-table td:first-child{text-align:left;padding-left:16px}
.dre-cat td:first-child{padding-left:8px!important;font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);background:var(--bg)}
.dre-result td{font-weight:700;background:rgba(45,122,79,0.05);border-top:2px solid var(--border)}
.dre-final td{font-weight:700;font-size:14px;background:rgba(26,10,14,0.04);border-top:2px solid var(--dark)}
/* CMV bar */
.bar-wrap{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:5px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s}
/* NPS */
.nps-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:6px}
.nps-fill{height:100%;border-radius:4px;transition:width 0.5s}
/* Assinatura */
.sig-canvas{border:2px dashed var(--border);border-radius:4px;background:#fff;cursor:crosshair;touch-action:none;display:block;width:100%;height:160px}
.sig-canvas.active{border-color:var(--cherry)}
.sig-canvas.done{border-color:var(--green);border-style:solid}
/* CRUD table actions */
.action-btns{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:16px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand"><div class="nav-dot"></div>Grupo Hannover</div>
  <div class="nav-right">
    <div class="nav-user" id="navUser"></div>
    <button class="nav-btn" id="btnPedidos" onclick="location.href='pedidos.html'" style="display:none">Novo Pedido</button>
    <button class="nav-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="app-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"><div class="toast-title" id="toastT"></div><div class="toast-msg" id="toastM"></div></div>

<!-- MODAIS -->
<div class="modal-overlay" id="modalGenerico">
  <div class="modal-box" id="modalGenericoBox"></div>
</div>
<div class="modal-overlay" id="modalLargo">
  <div class="modal-box wide" id="modalLargoBox"></div>
</div>
<div class="modal-overlay" id="modalAssinatura">
  <div class="modal-box">
    <div class="modal-title">Confirmar Recebimento</div>
    <div class="modal-sub" id="sigInfo">Assine abaixo para confirmar</div>
    <canvas id="sigCanvas" class="sig-canvas"></canvas>
    <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
      <button class="btn btn-ghost btn-sm" onclick="sigLimpar()">Limpar</button>
      <div style="flex:1;font-size:11px;color:var(--muted)" id="sigStatus">Desenhe sua assinatura acima</div>
      <button class="btn btn-ghost btn-sm" onclick="fecharModal('modalAssinatura')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="sigConfirmar()">Confirmar ✓</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// SUPABASE
// ─────────────────────────────────────────────────────────────
var SB_URL = 'https://qijwlgophinmscgtdpmb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpandsZ29waGlubXNjZ3RkcG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTE2NTMsImV4cCI6MjA5MTE2NzY1M30.HKrppltvS12zFglwtdNsbtBtUsui4jvBXvBJs6o82WM';

function sb(path, method, body) {
  return fetch(SB_URL+'/rest/v1'+path, {
    method: method||'GET',
    headers: { 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':'application/json', 'Prefer':'return=representation' },
    body: body ? JSON.stringify(body) : undefined
  });
}
function sbGet(path) { return sb(path).then(function(r){return r.ok?r.json():[];}).catch(function(){return[];}); }
function sbPost(path,body){ return sb(path,'POST',body); }
function sbPatch(path,body){ return sb(path,'PATCH',body); }
function sbDelete(path){ return sb(path,'DELETE'); }

// ─────────────────────────────────────────────────────────────
// SESSION & AUTH
// ─────────────────────────────────────────────────────────────
var USER = JSON.parse(sessionStorage.getItem('han_user')||'null');
if (!USER || !USER.acesso || USER.acesso.indexOf('dashboard')<0) {
  sessionStorage.clear(); window.location.href='login.html';
}
var PERFIL = USER.perfil;
var IS_ADMIN = PERFIL==='admin';

document.getElementById('navUser').innerHTML =
  '<div class="nav-user-name">'+USER.login+'</div>'+
  '<div class="nav-user-role">'+labelPerfil(PERFIL)+'</div>';
if (['admin','cd','cozinha','cd_cozinha'].indexOf(PERFIL)>=0)
  document.getElementById('btnPedidos').style.display='inline-block';

function labelPerfil(p) {
  return {'admin':'Administrador','comprador':'Comprador','cd':'CD Cadeia Seca','cozinha':'CD Cadeia Fria','cd_cozinha':'CD Geral','recebedor_fria':'Recebedor Fria','recebedor_seca':'Recebedor Seca','operador':'Gerente de Unidade'}[p]||p;
}
function logout(){ sessionStorage.clear(); location.href='login.html'; }

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
var D = {
  pedidos:[], solicitacoes:[], compras:[], romaneios:[],
  dailyRevenue:[], unitCosts:[], overheadEntries:[],
  npsScores:[], insumos:[], fornecedores:[],
  view:null, dreMonth: new Date().toISOString().slice(0,7),
  activeSolId:null, activeCompraId:null, activeRomaneioId:null
};
var UNIDADES = ['Hannover Fondue Moema','Hannover Fondue Perdizes','Hannover Fondue Tatuapé','Hannover Tomahawk','Hamburgo & Fries'];

// ─────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────
function buildSidebar() {
  var nav = '';
  if (PERFIL==='admin') {
    nav += sec('Gerencial');
    nav += item('dashboard','📊','Dashboard');
    nav += item('dre','📈','DRE por Unidade');
    nav += item('input','✏️','Input Diário');
    nav += sec('Suprimentos');
    nav += item('pedidos','📦','Pedidos Internos');
    nav += item('ordens','🛒','Ordens de Compra');
    nav += item('romaneios','🚚','Romaneios');
    nav += item('cmv','📉','CMV');
    nav += sec('Relacionamento');
    nav += item('nps','⭐','NPS');
    nav += sec('Admin');
    nav += item('usuarios','👥','Usuários');
    nav += item('insumos','📦','Insumos');
    nav += item('fornecedores','🏢','Fornecedores');
  } else if (['cd','cozinha','cd_cozinha'].indexOf(PERFIL)>=0) {
    nav += sec('Pedidos');
    nav += item('pedidos-cd','📦','Pedidos Recebidos');
    nav += item('romaneios','🚚','Romaneios');
    nav += sec('Compras');
    nav += item('sol-nova','📋','Solicitar Compra');
    nav += item('sol-minhas','🔄','Minhas Solicitações');
    nav += item('compras-retorno','✅','Retorno de Compras');
  } else if (PERFIL==='comprador') {
    nav += sec('Compras');
    nav += item('fila','📋','Fila de Compras');
    nav += item('em-andamento','🛒','Em Andamento');
    nav += item('ag-aprovacao','⏳','Aguard. Aprovação');
    nav += item('aprovadas','✅','Aprovadas');
    nav += item('historico','📁','Histórico');
  } else if (PERFIL==='recebedor_fria'||PERFIL==='recebedor_seca') {
    nav += sec('Recebimento');
    nav += item('recebimento','📬','A Receber');
    nav += item('romaneios','🚚','Romaneios');
  }
  document.getElementById('sidebar').innerHTML = nav;
}
function sec(t){ return '<div class="sb-sec">'+t+'</div>'; }
function item(id,icon,label){ return '<div class="sb-item" id="nav_'+id+'" onclick="go(\''+id+'\')"><span class="sb-icon">'+icon+'</span>'+label+'<span class="sb-badge" id="b_'+id+'"></span></div>'; }

function go(view) {
  document.querySelectorAll('.sb-item').forEach(function(el){el.classList.remove('active');});
  var el = document.getElementById('nav_'+view);
  if (el) el.classList.add('active');
  D.view = view;
  render(view);
}

function setBadge(id, n) {
  var el = document.getElementById('b_'+id);
  if (!el) return;
  if (n>0){ el.style.display='inline'; el.textContent=n; } else el.style.display='none';
}
function updateBadges() {
  setBadge('ordens', D.compras.filter(function(c){return c.status==='aguardando_aprovacao';}).length);
  setBadge('fila', D.solicitacoes.filter(function(s){return s.status==='pendente';}).length);
  setBadge('ag-aprovacao', D.compras.filter(function(c){return c.status==='aguardando_aprovacao'&&c.executor===USER.login;}).length);
  setBadge('recebimento', D.compras.filter(function(c){return c.status==='aprovado';}).length);
  var romPend = D.romaneios.filter(function(r){return !r.signed_at;}).length;
  setBadge('romaneios', romPend);
}

// ─────────────────────────────────────────────────────────────
// ROUTER
// ─────────────────────────────────────────────────────────────
function render(view) {
  var m = document.getElementById('main');
  m.innerHTML = '';
  var fn = {
    'dashboard': vDashboard,
    'dre': vDRE,
    'input': vInput,
    'pedidos': vPedidos,
    'pedidos-cd': vPedidosCD,
    'ordens': vOrdens,
    'romaneios': vRomaneios,
    'cmv': vCMV,
    'nps': vNPS,
    'fila': vFila,
    'em-andamento': vEmAndamento,
    'ag-aprovacao': vAguardando,
    'aprovadas': vAprovadas,
    'historico': vHistorico,
    'sol-nova': vSolNova,
    'sol-minhas': vSolMinhas,
    'compras-retorno': vComprasRetorno,
    'recebimento': vRecebimento,
    'usuarios': vUsuarios,
    'insumos': vInsumos,
    'fornecedores': vFornecedores
  }[view];
  if (fn) fn(m); else m.innerHTML = empty('Página não encontrada','');
}

// ─────────────────────────────────────────────────────────────
// VIEW: DASHBOARD
// ─────────────────────────────────────────────────────────────
function vDashboard(m) {
  var hoje = new Date().toISOString().split('T')[0];
  var mes = hoje.slice(0,7);

      '</div>')+

function buildDRE(mes) {
  function somaRev(u) {
    return D.dailyRevenue.filter(function(d){return d.unit_name===u&&(d.date||'').startsWith(mes);}).reduce(function(s,d){return s+(+d.revenue||0);},0);
  }
  function somaCMV(u) {
    return D.dailyRevenue.filter(function(d){return d.unit_name===u&&(d.date||'').startsWith(mes);}).reduce(function(s,d){return s+(+d.cmv||0);},0);
  }
  function custo(u, cat) {
    var cs = D.unitCosts.filter(function(c){return c.unit_name===u&&c.category===cat&&c.valid_from<=mes;});
    cs.sort(function(a,b){return b.valid_from.localeCompare(a.valid_from);});
    return cs.reduce(function(s,c){return s+(+c.amount||0);},0);
  }

  var data = {};
  UNIDADES.forEach(function(u) {
    var rb = somaRev(u);
    var ded = custo(u,'deducoes');
    var rl = rb-ded;
    var cmv = somaCMV(u);
    var mb = rl-cmv;
    var pessoal = custo(u,'pessoal');
    var ocup = custo(u,'ocupacao');
    var oper = custo(u,'operacional');
    var com = custo(u,'comercial');
    var adm = custo(u,'administrativo');
    var dep = custo(u,'depreciacao');
    var ebitda = mb-pessoal-ocup-oper-com-adm;
    data[u] = {rb,ded,rl,cmv,mb,pessoal,ocup,oper,com,adm,dep,ebitda};
  });

  var fatTotal = UNIDADES.reduce(function(s,u){return s+data[u].rb;},0);
  var ovTotal = D.overheadEntries.filter(function(o){return o.valid_from<=mes;}).reduce(function(s,o){return s+(+o.amount||0);},0);

  UNIDADES.forEach(function(u) {
    var share = fatTotal>0?data[u].rb/fatTotal:0;
    data[u].overhead = ovTotal*share;
    data[u].ebit = data[u].ebitda - data[u].overhead - data[u].dep;
  });

  var g = {};
  ['rb','ded','rl','cmv','mb','pessoal','ocup','oper','com','adm','ebitda','overhead','dep','ebit'].forEach(function(k){
    g[k] = UNIDADES.reduce(function(s,u){return s+(data[u][k]||0);},0);
  });

  function th() {
    var h = '<tr><th style="text-align:left">Linha</th>';
    UNIDADES.forEach(function(u){ h+='<th>'+u.replace('Hannover Fondue ','').replace('Hannover ','').replace('Hamburgo & Fries','Hamburgo')+'</th>'; });
    return h+'<th>Grupo</th></tr>';
  }

  function linha(label, key, cls) {
    var row = '<tr class="'+(cls||'')+'"><td>'+label+'</td>';
    UNIDADES.forEach(function(u){
      var v = data[u][key]||0;
      var rb = data[u].rb||0;
      row += '<td>'+(v!==0?'R$ '+fmt(v):'—')+(rb>0?'<br><span style="font-size:10px;color:var(--muted)">'+(v/rb*100).toFixed(1)+'%</span>':'')+'</td>';
    });
    var gv=g[key]||0, grb=g.rb||0;
    row += '<td style="font-weight:700">'+(gv!==0?'R$ '+fmt(gv):'—')+(grb>0?'<br><span style="font-size:10px;color:var(--muted)">'+(gv/grb*100).toFixed(1)+'%</span>':'')+'</td>';
    return row+'</tr>';
  }

  function cat(label) {
    return '<tr class="dre-cat"><td colspan="'+(UNIDADES.length+2)+'">'+label+'</td></tr>';
  }

  return '<div class="card" style="overflow-x:auto"><table class="dre-table"><thead>'+th()+'</thead><tbody>'+
    cat('RECEITA')+
    linha('Receita Bruta','rb')+
    linha('(–) Deduções Fiscais','ded')+
    linha('= Receita Líquida','rl','dre-result')+
    cat('CUSTOS')+
    linha('(–) CMV','cmv')+
    linha('= Margem Bruta','mb','dre-result')+
    cat('DESPESAS OPERACIONAIS')+
    linha('(–) Pessoal','pessoal')+
    linha('(–) Ocupação','ocup')+
    linha('(–) Operacional','oper')+
    linha('(–) Comercial','com')+
    linha('(–) Administrativo','adm')+
    linha('= EBITDA','ebitda','dre-result')+
    cat('RESULTADO')+
    linha('(–) Overhead Rateado','overhead')+
    linha('(–) D&A / Depreciação','dep')+
    linha('= EBIT / Resultado','ebit','dre-final')+
  '</tbody></table></div>';
}

function renderInputCards() {
  var date = (document.getElementById('inputDate')||{}).value;
  if (!date) return;
  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">';
  UNIDADES.forEach(function(u) {
    var ex = D.dailyRevenue.find(function(d){return d.unit_name===u&&d.date===date;});
    var uid = u.replace(/\W/g,'');
    var rev=ex?(+ex.revenue||0):'', cov=ex?(+ex.covers||0):'', cmv=ex?(+ex.cmv||0):'';
    var pct=ex&&+ex.revenue?(+ex.cmv/+ex.revenue*100).toFixed(1):'—';
    var pctColor = pct!=='—'?(+pct>28?'var(--cherry)':+pct>0?'var(--green)':'var(--muted)'):'var(--muted)';
    html +=
      '<div class="card">'+
        '<div class="card-hdr"><span class="card-title">'+u.replace('Hannover Fondue ','').replace('Hannover ','')+'</span>'+
          (ex?'<span class="badge b-ok"><span class="badge-dot"></span>Salvo</span>':'<span class="badge b-pending"><span class="badge-dot"></span>Pendente</span>')+
        '</div>'+
        '<div class="card-body">'+
          '<div class="form-row" style="margin-bottom:10px">'+
            '<div><div class="form-label">Faturamento R$</div><input class="form-input" type="number" id="r_'+uid+'" value="'+rev+'" placeholder="0,00" oninput="calcPct(\''+uid+'\')"></div>'+
            '<div><div class="form-label">Covers</div><input class="form-input" type="number" id="c_'+uid+'" value="'+cov+'" placeholder="0"></div>'+
          '</div>'+
          '<div class="form-row">'+
            '<div><div class="form-label">CMV R$</div><input class="form-input" type="number" id="m_'+uid+'" value="'+cmv+'" placeholder="0,00" oninput="calcPct(\''+uid+'\')"></div>'+
            '<div><div class="form-label">CMV %</div><input class="form-input" id="p_'+uid+'" value="'+(pct!=='—'?pct+'%':'')+'" readonly style="font-weight:700;color:'+pctColor+';background:var(--border)"></div>'+
          '</div>'+
          '<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="salvarInput(\''+u+'\',\''+uid+'\')">Salvar</button>'+
        '</div>'+
      '</div>';
  });
  html += '</div>';
  document.getElementById('inputCards').innerHTML = html;
}

function calcPct(uid) {
  var r=+(document.getElementById('r_'+uid)||{}).value||0;
  var c=+(document.getElementById('m_'+uid)||{}).value||0;
  var el=document.getElementById('p_'+uid);
  if(!el)return;
  if(r>0){var p=(c/r*100).toFixed(1);el.value=p+'%';el.style.color=p>28?'var(--cherry)':'var(--green)';}
  else{el.value='';el.style.color='var(--muted)';}
}

async function salvarInput(unidade, uid) {
  var date=document.getElementById('inputDate').value;
  var rev=+(document.getElementById('r_'+uid)||{}).value||0;
  var cov=+(document.getElementById('c_'+uid)||{}).value||0;
  var cmv=+(document.getElementById('m_'+uid)||{}).value||0;
  load(true);
  try {
    var ex=D.dailyRevenue.find(function(d){return d.unit_name===unidade&&d.date===date;});
    var body={unit_name:unidade,date:date,revenue:rev,covers:cov,cmv:cmv,created_by:USER.login,updated_at:new Date().toISOString()};
    if(ex){
      await sbPatch('/daily_revenue?unit_name=eq.'+enc(unidade)+'&date=eq.'+date,body);
      Object.assign(ex,body);
    } else {
      var r=await sbPost('/daily_revenue',body);
      if(r.ok){var d=await r.json();if(d&&d[0])D.dailyRevenue.push(d[0]);}
    }
    load(false); toast('Salvo ✓',unidade+' · '+date); renderInputCards();
  } catch(e){load(false);toast('Erro','Não foi possível salvar.');}
}

// VIEW: NPS
function vNPS(m) {
  var semanas=[...new Set(D.npsScores.map(function(n){return n.week_ref;}))].sort().reverse();
  var ultima = semanas[0]||'—';
  var UN4 = UNIDADES.slice(0,4);

  var cards='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px">';
  var somaMedia=0,ctMedia=0;
  UN4.forEach(function(u){
    var s=D.npsScores.find(function(n){return n.unit_name===u&&n.week_ref===ultima;});
    var v=s?s.score:null;
    var cor=v===null?'var(--muted)':v>=75?'var(--green)':v>=50?'var(--seca)':'var(--cherry)';
    if(v!==null){somaMedia+=v;ctMedia++;}
    cards+=
      '<div class="card" style="padding:14px">'+
        '<div class="kpi-lbl">'+u.replace('Hannover Fondue ','').replace('Hannover ','')+'</div>'+
        '<div style="font-size:28px;font-weight:700;color:'+cor+';font-family:Cormorant Garamond,serif">'+(v!==null?v:'—')+'</div>'+
        '<div class="nps-bar"><div class="nps-fill" style="width:'+(v||0)+'%;background:'+cor+'"></div></div>'+
      '</div>';
  });
  var media=ctMedia>0?(somaMedia/ctMedia).toFixed(0):'—';
  var mediaCor=+media>=75?'var(--green)':+media>=50?'var(--seca)':'var(--cherry)';
  cards+='<div class="card" style="padding:14px;border:2px solid var(--gold)"><div class="kpi-lbl">Média Grupo</div><div style="font-size:28px;font-weight:700;color:'+mediaCor+';font-family:Cormorant Garamond,serif">'+media+'</div></div></div>';

  var rows='';
  semanas.slice(0,16).forEach(function(sem){
    rows+='<tr><td><b>'+sem+'</b></td>';
    var tot=0,ct=0;
    UN4.forEach(function(u){
      var s=D.npsScores.find(function(n){return n.unit_name===u&&n.week_ref===sem;});
      var v=s?s.score:null;
      var cor=v===null?'var(--muted)':v>=75?'var(--green)':v>=50?'var(--seca)':'var(--cherry)';
      rows+='<td style="font-weight:600;color:'+cor+'">'+(v!==null?v:'—')+'</td>';
      if(v!==null){tot+=v;ct++;}
    });
    var avg=ct>0?(tot/ct).toFixed(0):'—';
    rows+='<td style="font-weight:700">'+avg+'</td></tr>';
  });

  m.innerHTML =
    pgHeader('NPS','Net Promoter Score semanal por unidade',
      IS_ADMIN?'<button class="btn btn-primary btn-sm" onclick="abrirNPS()">+ Lançar NPS</button>':'')+
    cards+
    '<div class="card"><div class="card-hdr"><span class="card-title">Histórico de Semanas</span></div>'+
    '<div style="overflow-x:auto"><table><thead><tr><th>Semana</th>'+UN4.map(function(u){return '<th>'+u.replace('Hannover Fondue ','').replace('Hannover ','')+'</th>';}).join('')+'<th>Média</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

async function salvarInsumo(id) {
  var nome=(document.getElementById('ins_nome')||{}).value||'';
  var cod=(document.getElementById('ins_cod')||{}).value||'';
  var unid=(document.getElementById('ins_unid')||{}).value||'';
  var cat=(document.getElementById('ins_cat')||{}).value||'';
  var preco=+(document.getElementById('ins_preco')||{}).value||null;
  if(!nome||!unid||!cat){toast('Atenção','Preencha nome, unidade e categoria.');return;}
  var body={nome,codigo:cod||null,unidade_medida:unid,categoria:cat,preco_unitario:preco,updated_at:new Date().toISOString()};
  load(true);
  try {
    if(id){
      await sbPatch('/insumos?id=eq.'+id, body);
      var i=D.insumos.find(function(x){return x.id===id;});
      if(i)Object.assign(i,body);
    } else {
      var r=await sbPost('/insumos',Object.assign(body,{ativo:true}));
      if(r.ok){var d=await r.json();if(d&&d[0])D.insumos.push(d[0]);}
    }
    load(false); fecharModal('modalGenerico'); toast('Salvo ✓','');
    vInsumos(document.getElementById('main'));
  } catch(e){load(false);toast('Erro','Não foi possível salvar.');}
}

async function toggleInsumo(id, ativo) {
  await sbPatch('/insumos?id=eq.'+id,{ativo:ativo});
  var i=D.insumos.find(function(x){return x.id===id;});
  if(i)i.ativo=ativo;
  vInsumos(document.getElementById('main'));
}

function abrirNPS() {

  var html=
    '<div class="modal-title">Lançar NPS da Semana</div>'+
    '<div class="form-field"><div class="form-label">Semana de referência</div><input class="form-input" id="npsRef" value="'+semAtual+'"></div>'+
    UN4.map(function(u){
      return '<div class="form-row"><div class="form-field"><div class="form-label">'+u.replace('Hannover Fondue ','').replace('Hannover ','')+'</div>'+
        '<input class="form-input" type="number" min="0" max="100" id="nps_'+u.replace(/\W/g,'')+'" placeholder="0 a 100"></div>'+
        '<div class="form-field"><div class="form-label">Respondentes</div><input class="form-input" type="number" min="0" id="npsct_'+u.replace(/\W/g,'')+'" placeholder="Qtd"></div></div>';
    }).join('')+
    '<div class="modal-footer"><button class="btn btn-ghost btn-sm" onclick="fecharModal(\'modalGenerico\')">Cancelar</button><button class="btn btn-primary btn-sm" onclick="salvarNPS()">Salvar NPS</button></div>';
  abrirModal(html);
}

async function salvarNPS() {
  var ref=(document.getElementById('npsRef')||{}).value.trim();
  if(!ref){toast('Atenção','Informe a semana.');return;}
  var UN4=UNIDADES.slice(0,4);
  load(true);
  for(var i=0;i<UN4.length;i++){
    var u=UN4[i];
    var uid=u.replace(/\W/g,'');
    var v=+(document.getElementById('nps_'+uid)||{}).value||null;
    if(v===null)continue;
    var ct=+(document.getElementById('npsct_'+uid)||{}).value||0;
    var ex=D.npsScores.find(function(n){return n.unit_name===u&&n.week_ref===ref;});
    if(ex){
      await sbPatch('/nps_scores?unit_name=eq.'+enc(u)+'&week_ref=eq.'+enc(ref),{score:v,respondentes:ct});
      ex.score=v;ex.respondentes=ct;
    } else {
      var r=await sbPost('/nps_scores',{unit_name:u,week_ref:ref,score:v,respondentes:ct,created_by:USER.login});
      if(r.ok){var d=await r.json();if(d&&d[0])D.npsScores.push(d[0]);}
    }
  }
  load(false);fecharModal('modalGenerico');toast('NPS salvo ✓',ref);render('nps');
}

function getWeek(){var d=new Date();d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);var y=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-y)/86400000)+1)/7);}

async function submitCompra(count) {
  var solId=D.activeSolId;
  var sol=D.solicitacoes.find(function(s){return s.sol_id===solId;});
  var itens=sol?sol.itens||[]:[];
  var criados=[];
  for(var i=0;i<count;i++){
    var forn=(document.getElementById('pc_f'+i)||{}).value||'';
    var val=+(document.getElementById('pc_v'+i)||{}).value||0;
    var prazo=(document.getElementById('pc_p'+i)||{}).value||'';
    var data=(document.getElementById('pc_d'+i)||{}).value||'';
    if(!forn||!val){continue;}
    var it=itens[i]||{};
    var cid='CMP-'+Date.now()+'-'+i;
    var body={compra_id:cid,sol_id:solId,solicitante:sol?sol.solicitante:'',executor:USER.login,produto:it.nome||'',fornecedor:forn,qtd_confirmada:it.qtd||'',valor:val,prazo_pagamento:prazo,prazo_entrega:data,status:'aguardando_aprovacao',timestamp:new Date().toISOString()};
    load(true);
    var r=await sbPost('/compras',body);
    if(r.ok){var d=await r.json();if(d&&d[0]){D.compras.unshift(d[0]);criados.push(d[0]);}}
    else{D.compras.unshift(body);criados.push(body);}
  }
  if(sol&&criados.length){
    sol.status='em_andamento';
    await sbPatch('/solicitacoes?sol_id=eq.'+enc(solId),{status:'em_andamento',updated_at:new Date().toISOString()});
  }
  load(false);fecharModal('modalLargo');
  if(criados.length){toast('Compra(s) criada(s) ✓',criados.length+' enviada(s) para aprovação.');}
  else{toast('Atenção','Nenhum item foi preenchido com fornecedor e valor.');}
  updateBadges();render(D.view);
}

function detalhePedido(p) {
  var its=p.itens||[];
  if(!its.length) return '<div style="padding:16px;color:var(--muted)">Sem itens.</div>';
  var rows=its.map(function(it){
    return '<tr><td style="color:var(--muted);font-size:11px">'+(it.codigo||'—')+'</td>'+
      '<td style="font-weight:600">'+it.produto+'</td><td>'+it.categoria+'</td>'+
      '<td style="text-align:center;font-weight:700">'+it.qty+'</td><td>'+it.unidade+'</td>'+
      '<td style="text-align:right">'+(it.valorTotal?'R$ '+fmt(it.valorTotal):'—')+'</td>'+
      '<td><span class="badge '+(it.destino==='matheus'?'b-fria':'b-seca')+'">'+(it.destino==='matheus'?'Fria':'Seca')+'</span></td>'+
    '</tr>';
  }).join('');
  var html='<div style="padding:16px">';
  if(p.obs) html+='<p style="font-size:12px;color:var(--muted);margin-bottom:10px"><b>Obs:</b> '+p.obs+'</p>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th>Cód.</th><th>Produto</th><th>Categoria</th><th style="text-align:center">Qtd</th><th>Unid.</th><th style="text-align:right">Valor</th><th>Cadeia</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  // Ações
  if(p.status==='pendente'&&['admin','cd','cozinha','cd_cozinha'].indexOf(PERFIL)>=0){
    var hasFria=its.some(function(x){return x.destino==='matheus';});
    var hasSeca=its.some(function(x){return x.destino==='miguel';});
    html+='<div style="margin-top:12px;display:flex;gap:8px">';
    if(hasFria) html+='<button class="btn btn-green btn-sm" onclick="despachar(\''+p.pedido_id+'\',\'fria\',event)">🚚 Despachar Fria</button>';
    if(hasSeca) html+='<button class="btn btn-amber btn-sm" onclick="despachar(\''+p.pedido_id+'\',\'seca\',event)">🚚 Despachar Seca</button>';
    html+='</div>';
  }
  // Assinatura
  if(p.status==='despachado'){
    if(!p.signature_data){
      html+='<div style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="abrirAssinatura(null,\''+p.pedido_id+'\',event)">✍ Assinar Recebimento</button></div>';
    } else {
      html+='<div style="margin-top:12px;padding:10px;background:rgba(45,122,79,0.08);border-radius:3px;font-size:12px;color:var(--green)">✓ <b>Assinado</b> em '+dtStr(p.signed_at)+' por '+p.signed_by+'</div>';
    }
  }
  html+='</div>';
  return html;
}

async function despachar(pedidoId, cadeia, e) {
  if(e)e.stopPropagation();
  var motorista=prompt('Nome do motorista/entregador:');
  if(!motorista)return;
  load(true);
  var now=new Date().toISOString();
  await sbPatch('/pedidos?pedido_id=eq.'+enc(pedidoId),{status:'despachado',driver_name:motorista,dispatched_at:now});
  var p=D.pedidos.find(function(x){return x.pedido_id===pedidoId;});
  if(p){p.status='despachado';p.driver_name=motorista;p.dispatched_at=now;}
  // Cria romaneio
  var its=(p?p.itens||[]:[]).filter(function(x){
    if(cadeia==='ambas')return true;
    return cadeia==='fria'?x.destino==='matheus':x.destino==='miguel';
  });
  var r=await sbPost('/romaneios',{pedido_id:pedidoId,unidade:p?p.unidade:'',cadeia:cadeia==='fria'?'fria':'seca',motorista:motorista,despachado_em:now,itens:its});
  if(r.ok){var d=await r.json();if(d&&d[0])D.romaneios.unshift(d[0]);}
  load(false);updateBadges();toast('Despachado ✓','Romaneio criado.');render(D.view);
}

function tabelaRomaneios() {
  var roms=D.romaneios;
  if(!roms.length) return empty('Nenhum romaneio','Romaneios são criados automaticamente ao despachar pedidos.');
  var limite24=new Date(Date.now()-24*3600*1000).toISOString();
  var rows=roms.map(function(r){
    var atrasado=!r.signed_at&&r.created_at<limite24;
    return '<tr>'+
      '<td><div class="td-name">#'+(r.numero||'—')+'</div><div class="td-sub">'+dtStr(r.created_at)+'</div></td>'+
      '<td>'+(r.unidade||'—')+'</td>'+
      '<td><span class="badge '+(r.cadeia==='fria'?'b-fria':'b-seca')+'">'+r.cadeia+'</span></td>'+
      '<td>'+(r.motorista||'—')+'</td>'+
      '<td>'+(!r.signed_at?'<span class="badge b-pending">'+(atrasado?'⚠ Atrasado':'Pendente')+'</span>':'<span class="badge b-ok">✓ Assinado</span>')+'</td>'+
      '<td>'+
        (!r.signed_at&&['admin','operador','cd','cozinha','cd_cozinha','recebedor_fria','recebedor_seca'].indexOf(PERFIL)>=0?
          '<button class="btn btn-primary btn-sm" onclick="abrirAssinatura(\''+r.id+'\',null,event)" style="margin-right:6px">✍ Assinar</button>':'')+
        '<button class="btn btn-ghost btn-sm" onclick="imprimirRomById(\''+r.id+'\')">🖨 PDF</button>'+
      '</td>'+
    '</tr>';
  }).join('');
  return '<table><thead><tr><th>Romaneio</th><th>Unidade</th><th>Cadeia</th><th>Motorista</th><th>Status</th><th>Ações</th></tr></thead><tbody>'+rows+'</tbody></table>';

async function imprimirRom(pedidoId, cadeia, e) {
  if(e)e.stopPropagation();
  var r=D.romaneios.find(function(x){return x.pedido_id===pedidoId&&(cadeia==='ambas'||x.cadeia===(cadeia==='fria'?'fria':'seca'));});
  if(!r){toast('Atenção','Despache o pedido primeiro para gerar o romaneio.');return;}
  imprimirRomById(r.id);

function imprimirRomById(romId) {
  var r=D.romaneios.find(function(x){return x.id===romId;});
  if(!r){toast('Erro','Romaneio não encontrado.');return;}
  var its=r.itens||[];

// ─────────────────────────────────────────────────────────────
// ASSINATURA DIGITAL
// ─────────────────────────────────────────────────────────────
var _sigRomId=null, _sigPedId=null, _sigDraw=false;

function abrirAssinatura(romId, pedId, e) {
  if(e)e.stopPropagation();
  _sigRomId=romId; _sigPedId=pedId;
  var info=romId?'Romaneio #'+(D.romaneios.find(function(r){return r.id===romId;})||{}).numero:'Pedido '+pedId;
  document.getElementById('sigInfo').textContent='Assine abaixo para confirmar o recebimento · '+info;
  initCanvas();
  document.getElementById('modalAssinatura').classList.add('show');
}

function initCanvas() {
  var canvas=document.getElementById('sigCanvas');
  canvas.className='sig-canvas';
  var ctx=canvas.getContext('2d');
  // Ajusta resolução para mobile
  var rect=canvas.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  canvas.width=(rect.width||400)*dpr;
  canvas.height=160*dpr;
  canvas.style.width=(rect.width||400)+'px';
  canvas.style.height='160px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,(rect.width||400),160);
  ctx.strokeStyle='#2C1010';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  document.getElementById('sigStatus').textContent='Desenhe sua assinatura acima';

  function pos(e){
    var r=canvas.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left),y:(src.clientY-r.top)};
  }
  function start(e){e.preventDefault();_sigDraw=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){e.preventDefault();if(!_sigDraw)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function stop(e){e.preventDefault();_sigDraw=false;canvas.className='sig-canvas done';document.getElementById('sigStatus').textContent='Assinatura capturada ✓';}
  canvas.removeEventListener('mousedown',canvas._mstart);canvas.removeEventListener('mousemove',canvas._mmove);canvas.removeEventListener('mouseup',canvas._mstop);
  canvas.removeEventListener('touchstart',canvas._tstart);canvas.removeEventListener('touchmove',canvas._tmove);canvas.removeEventListener('touchend',canvas._tstop);
  canvas._mstart=start;canvas._mmove=move;canvas._mstop=stop;
  canvas._tstart=start;canvas._tmove=move;canvas._tstop=stop;
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',stop);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',stop,{passive:false});
}

function sigLimpar(){initCanvas();}

async function sigConfirmar() {
  var canvas=document.getElementById('sigCanvas');
  if(!canvas.classList.contains('done')){toast('Atenção','Assine antes de confirmar.');return;}
  var img=canvas.toDataURL('image/png');
  var now=new Date().toISOString();
  load(true);
  if(_sigRomId){
    await sbPatch('/romaneios?id=eq.'+enc(_sigRomId),{signature_data:img,signed_at:now,signed_by:USER.login});
    var r=D.romaneios.find(function(x){return x.id===_sigRomId;});
    if(r){r.signature_data=img;r.signed_at=now;r.signed_by=USER.login;}
  }
  if(_sigPedId){
    await sbPatch('/pedidos?pedido_id=eq.'+enc(_sigPedId),{status:'entregue',signature_data:img,signed_at:now,signed_by:USER.login});
    var p=D.pedidos.find(function(x){return x.pedido_id===_sigPedId;});
    if(p){p.status='entregue';p.signature_data=img;p.signed_at=now;p.signed_by=USER.login;}
  }
  load(false);fecharModal('modalAssinatura');
  toast('Recebimento confirmado ✓','Assinatura salva com sucesso.');
  updateBadges();render(D.view);
}

// LOAD DATA
// ─────────────────────────────────────────────────────────────
async function loadData() {
  load(true);
  try {
    var res=await Promise.all([
      sbGet('/pedidos?order=timestamp.desc&limit=200'),
      sbGet('/solicitacoes?order=timestamp.desc&limit=200'),
      sbGet('/compras?order=timestamp.desc&limit=200'),
      sbGet('/romaneios?order=created_at.desc&limit=200'),
      sbGet('/daily_revenue?order=date.desc&limit=1000'),
      sbGet('/nps_scores?order=created_at.desc&limit=500'),
      sbGet('/unit_costs?order=valid_from.desc&limit=500'),
      sbGet('/overhead_entries?order=valid_from.desc&limit=200'),
      sbGet('/insumos?order=nome.asc&limit=1000'),
      sbGet('/fornecedores?order=nome.asc&limit=500')
    ]);
    D.pedidos=res[0]||[];
    D.solicitacoes=res[1]||[];
    D.compras=res[2]||[];
    D.romaneios=res[3]||[];
    D.dailyRevenue=res[4]||[];
    D.npsScores=res[5]||[];
    D.unitCosts=res[6]||[];
    D.overheadEntries=res[7]||[];
    D.insumos=res[8]||[];
    D.fornecedores=res[9]||[];
    load(false);updateBadges();render(D.view);
  } catch(e) {
    D.pedidos=[];D.solicitacoes=[];D.compras=[];D.romaneios=[];
    D.dailyRevenue=[];D.npsScores=[];D.unitCosts=[];D.overheadEntries=[];
    D.insumos=[];D.fornecedores=[];
    load(false);updateBadges();render(D.view);
  }
}

}
function kpi(cls,lbl,val,sub){return'<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';}
function badgeSt(s){var m={pendente:['b-pending','Pendente'],em_andamento:['b-progress','Em Andamento'],despachado:['b-wait','Despachado'],entregue:['b-done','Entregue'],aguardando_aprovacao:['b-wait','Aguard. Aprovação'],aprovado:['b-ok','Aprovado'],rejeitado:['b-reject','Rejeitado'],recebido:['b-done','Recebido']};var v=m[s]||['b-pending',s||'—'];return'<span class="badge '+v[0]+'"><span class="badge-dot"></span>'+v[1]+'</span>';}
function togglePanel(prefix,i){var el=document.getElementById(prefix+'_'+i);if(!el)return;var open=el.classList.contains('open');document.querySelectorAll('.detail-panel').forEach(function(p){p.classList.remove('open');});if(!open)el.classList.add('open');}
function empty(t,s){return'<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">'+t+'</div><div class="empty-sub">'+s+'</div></div>';}
function fmt(v){return(+v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function dtStr(s){if(!s)return'—';try{return new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return s;}}
function toast(t,m){var el=document.getElementById('toast');document.getElementById('toastT').textContent=t;document.getElementById('toastM').textContent=m;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},4000);}
function load(v){document.getElementById('loadingOverlay').classList[v?'add':'remove']('show');}
function fecharModal(id){document.getElementById(id).classList.remove('show');}
function abrirModal(html){document.getElementById('modalGenericoBox').innerHTML=html;document.getElementById('modalGenerico').classList.add('show');}
function abrirModalLargo(html){document.getElementById('modalLargoBox').innerHTML=html;document.getElementById('modalLargo').classList.add('show');}
function enc(s){return encodeURIComponent(s);}
